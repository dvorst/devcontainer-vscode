default_stages: [pre-commit, pre-push]
repos:

  # Vanilla hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Prevent merge conflict markers
      - id: check-merge-conflict

      # Prevent commits to main branch (or to its previous name: master)
      # This should also be blocked in repository settings
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

      # Ensure each line end with a newline
      - id: end-of-file-fixer

      # Remove trailing whitespace in lines
      - id: trailing-whitespace

      # Convert CRLF (Windows) line endings, to UNIX (LF)
      # Bash scripts cannot be run with CRLF line-endings, this will prompt the (incorrect) error
      # that the file cannot be found.
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Pyrefly (mypy alternative that is faster, written in rust)
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 0.44.0
    hooks:
      - id: pyrefly-typecheck-system
        name: Pyrefly
        pass_filenames: false # whether to check changed files, false: checks full repo
        language: system  # Use system-installed pyrefly

  # # AWS Cloud Formation Linter
  # - repo: https://github.com/aws-cloudformation/cfn-lint
  #   rev: v1.39.1  # or the latest stable version
  #   hooks:
  #     - id: cfn-python-lint
  #       files: ^stacks/.*\.(yml|yaml)$

